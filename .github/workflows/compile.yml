name: Compile Edge Configuration

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('scripts/preprocess.ts') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Preprocess and compile all instances
        run: ./gradlew build

      - name: Upload compiled configs
        uses: actions/upload-artifact@v6
        with:
          name: compiled-configs
          path: build/*/compiled-config.json
          retention-days: 90
